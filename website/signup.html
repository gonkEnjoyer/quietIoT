        <header>
            <ul class = "navBar">

        </header>
        <main>
            <div class = "content login">
                <div class = "heading">
                    <h2>Sign Up</h2>
                </div>
                <form id = "signup-form" method = "post" name = "signup-form">
                    <label for = "email-input">Email</label>
                    <input type = "email" name = "email-input" placeholder = "your.email@example.com" required/>
                    <label for = "password-input">Password</label>
                    <input type = "password" name = "password-input" id = "password-input" placeholder = "Must be at least 8 characters" required/>
                    <label for = "password-input">Confirm Password</label>
                    <input type = "password" name = "password-confirm" id = "password-confirm" placeholder = "Re-enter your password" required/>
                    <!--<label for = "toggle">Show password<input type = "checkbox" id = "visibilityToggle" name = "toggle" onclick = "showPassword()"></label>!-->
                    <button type = "submit">Sign up &#8227</button>
                </form>
            </div>
        </main>
        <footer>
            <p>This site is on <a href = "https://github.com/coronelGuasap9809/quietiot" target = "_blank">GitHub</a></p>
        </footer>
