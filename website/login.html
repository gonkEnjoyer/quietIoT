<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="color-scheme" content="light dark">
        <link href = "./assets/main.css" rel = "stylesheet">
        <link href = "./assets/mobile.css" rel = "stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="icon" type="image/x-icon" href="./assets/images/icons/favicon.ico">
        <script type = "text/javascript" src = "./assets/scripts/ui.js" defer></script>
        <title>QuietIoT - Login</title>
    </head>
    <body>
        <header>
            <ul class = "navBar">
                <li><img src = "./assets/images/logo.png" alt = "Logo"><h1>QuietIoT</h1></li>
                <li><a href = "index.html">Home</a></li>
                <li><a href = "dashboard.html">Dashboard</a></li>
                <li><a href = "settings.html">Settings</a></li>
                <li class = "right"><a class = "active" href = "login.html">Loading...</a></li>
            </ul>
        </header>
        <main>
            <div class = "loading-screen"><p>Loading...</p><img src = "./assets/images/icons/loading_icon.png" class = loading-icon></div>
            <div class = "content login">
                <div class = "heading">
                    <h2>Login</h2>
                </div>
                <div class = "hide-when-logged-in">
                    <form id="login-form" method="post" name="login-form">
                        <label for = "email-input">Email</label>
                        <input type = "email" name = "email-input" placeholder = "your.email@example.com" required/>
                        <label for = "password-input">Password</label>
                        <input type = "password" name = "password-input" id = "password-input" placeholder = "Your password" required/>
                        <button type = "submit">Log in &#8227</button>
                    </form>
                    <p class = "signup-prompt">Don't have an account? <a href = "./signup.html">Sign up here.</a></p>
                </div>
                <div class = "show-when-logged-in">
                    <p>You are already logged in.</p>
                    <button id = "logout-button" class = "settings-button">Log Out</button>
                    <p>Manage your account settings <a href = "./settings.html#account-section">here</a> or view your device <a href = "./dashboard.html">dashboard</a>.</p>
                </div>
            </div>
        </main>
        <footer>
            <p>This site is on <a href = "https://github.com/gonkEnjoyer/quietiot" target = "_blank">GitHub</a></p>
        </footer>
        <script type="module" src="./assets/scripts/firebase_auth.js" defer></script>
        <script type = "text/javascript" src = "./assets/scripts/loading.js" defer></script>
    </body>
</html>
